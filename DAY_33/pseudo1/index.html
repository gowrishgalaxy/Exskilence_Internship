<!DOCTYPE html>
<html>
<head>
  <title>Exclude Paragraphs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <p>This will appear green.</p>
  <p class="no-green">This will not change.</p>
  <p>Paragraphs can be selectively styled!</p>
  <p class="no-green">Green style is excluded here.</p>
  <p>Try adding or removing the no-green class in your tests.</p>

</body>
</html>
